command = "jest"
description = "Strip noise; show test suite summary and failure details"
strip_ansi = true
skip = [
  "^\\s*$",
  "^> ",
  "^\\s*npm (warn|notice|WARN|verbose|info|timing|error|ERR)",
  "^\\s*WARN\\s",
  "^\\s*console\\.log",
  "^\\s*at Object",
]

[on_success]
tail = 15

[on_failure]
tail = 30
