name = "untracked files in newly created directories list individually"
# Regression: previously the porcelain default (-unormal) collapsed untracked
# directories to "?? new_module/" — the model couldn't see the file it had
# just created and would loop trying to find it. With -uall in the run
# override, every untracked file appears with its full path.
inline = """
## main...origin/main
?? new_module/a.rs
?? new_module/b.rs
?? new_module/sub/c.rs
"""
exit_code = 0

[[expect]]
equals = "main [synced]\n?? new_module/a.rs\n?? new_module/b.rs\n?? new_module/sub/c.rs"
