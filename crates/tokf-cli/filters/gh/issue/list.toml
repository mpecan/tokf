command = "gh issue list"
description = "Structured JSON extraction of issue number, title, state, and labels"
run = "gh issue list --json number,title,state,labels {args}"
passthrough_args = ["--web", "-w"]

[json]

[[json.extract]]
path = "$[*]"
as = "issues"

[[json.extract.fields]]
field = "number"
as = "number"

[[json.extract.fields]]
field = "title"
as = "title"

[[json.extract.fields]]
field = "state"
as = "state"

[[json.extract.fields]]
field = "labels"
as = "labels"

[on_success]
output = "{issues | each: \"#{number}  {title}  {state}  {labels}\" | join: \"\\n\"}"

[on_failure]
tail = 10
