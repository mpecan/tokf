command = "gh pr view *"
description = "Structured JSON extraction of PR details with review status and body"
run = "gh pr view {args} --json number,title,state,author,headRefName,baseRefName,reviewDecision,labels,assignees,milestone,body"
passthrough_args = ["--web", "-w"]

[json]

[[json.extract]]
path = "$.number"
as = "number"

[[json.extract]]
path = "$.title"
as = "title"

[[json.extract]]
path = "$.state"
as = "state"

[[json.extract]]
path = "$.author.login"
as = "author"

[[json.extract]]
path = "$.headRefName"
as = "head"

[[json.extract]]
path = "$.baseRefName"
as = "base"

[[json.extract]]
path = "$.reviewDecision"
as = "review"

[[json.extract]]
path = "$.milestone"
as = "milestone"

[[json.extract]]
path = "$.body"
as = "body"

[[json.extract]]
path = "$.labels[*]"
as = "labels"

[[json.extract.fields]]
field = "name"
as = "name"

[[json.extract]]
path = "$.assignees[*]"
as = "assignees"

[[json.extract.fields]]
field = "login"
as = "login"

[on_success]
output = "#{number} {title}\nstate: {state}\nauthor: {author}\nbranch: {head} -> {base}\nreview: {review}\nassignees: {assignees | each: \"{login}\" | join: \", \"}\nlabels: {labels | each: \"{name}\" | join: \", \"}\nmilestone: {milestone}\n--\n{body}"

[on_failure]
tail = 10
