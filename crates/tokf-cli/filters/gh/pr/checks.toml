command = "gh pr checks *"
run = "gh pr checks {args} --json name,state,workflow"

[json]

[[json.extract]]
path = "$[*]"
as = "checks"

[[json.extract.fields]]
field = "name"
as = "name"

[[json.extract.fields]]
field = "state"
as = "state"

[[json.extract.fields]]
field = "workflow"
as = "workflow"

[on_success]
output = "all checks passed ({checks_count} checks)"

[on_failure]
output = "{checks | each: \"{state}  {name}  ({workflow})\" | join: \"\\n\"}"
