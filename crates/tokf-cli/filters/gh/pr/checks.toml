command = "gh pr checks *"
description = "Structured JSON extraction of CI check names and status"
run = "gh pr checks {args} --json name,state,workflow"
passthrough_args = ["--watch", "--web", "-w"]

[json]

[[json.extract]]
path = "$[*]"
as = "checks"

[[json.extract.fields]]
field = "name"
as = "name"

[[json.extract.fields]]
field = "state"
as = "state"

[[json.extract.fields]]
field = "workflow"
as = "workflow"

[on_success]
output = "{checks | each: \"{state}  {name}  ({workflow})\" | join: \"\\n\"}"

[on_failure]
output = "{checks | each: \"{state}  {name}  ({workflow})\" | join: \"\\n\"}"
