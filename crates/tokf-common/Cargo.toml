[package]
name = "tokf-common"
version = "0.2.42"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Shared types and utilities for the tokf CLI tool"
keywords = ["llm", "cli", "tokens", "ai", "context-window"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
# Required by `hash::epochs::*` for parsing filter TOML against frozen
# historical schemas (issue #350). Previously feature-gated under
# `validation`; promoted to a regular dep in 0.2.43.
toml = "1.0"
regex = { version = "1", optional = true }
unicode-normalization = "0.1"

[features]
default = []
validation = ["regex"]

[lints]
workspace = true

[dev-dependencies]
ts-rs = "12"
